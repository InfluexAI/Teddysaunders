<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ted Saunders — Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="ext-resource-dependency" content="assets/logo.png" data-resource-id="logo" />
  <meta name="ext-resource-dependency" content="assets/cosmic-bg.png" data-resource-id="cosmic" />
  <meta name="ext-resource-dependency" content="assets/teddy-hero.jpg" data-resource-id="teddyhero" />
  <meta name="ext-resource-dependency" content="assets/logomark.png" data-resource-id="logomark" />
  <meta name="ext-resource-dependency" content="assets/heading-texture.jpg" data-resource-id="headingTexture" />

  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="contact.css">

  <style>
    html, body { margin: 0; background: #000; overflow-x: hidden; }
    body { min-width: 760px; }
    /* content column tracks the homepage: 1408 of a 1920 design, scaled = 73.3vw (capped) */
    /* content fills reticle-to-reticle like the homepage hero (1468/1920 = 76.46vw),
       + the 64px inner section padding on each side so card edges land on the reticles */
    body.v2-standalone { --col: max(720px, calc(76.46vw + 128px)); }
    #root { display: flex; justify-content: center; }
    /* standalone: the page itself scrolls; center the fluid design column */
    .v2-stage { width: var(--col, 1200px); }
    .v2-stage .cpage { animation: c-fade .6s ease both; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <template id="__bundler_thumbnail" data-bg-color="#000000">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#F7DBA0"/><stop offset="50%" stop-color="#D29B5A"/><stop offset="100%" stop-color="#AB7442"/>
        </linearGradient>
      </defs>
      <rect width="1200" height="800" fill="#000"/>
      <circle cx="600" cy="360" r="118" fill="none" stroke="url(#b)" stroke-width="3"/>
      <polygon points="600,260 618,360 600,378 582,360" fill="url(#b)"/>
      <polygon points="600,460 618,360 600,342 582,360" fill="#6b4e2f"/>
      <circle cx="600" cy="360" r="9" fill="#0A0805" stroke="#E8B777" stroke-width="2"/>
      <text x="600" y="560" font-family="Cinzel, Times, serif" font-weight="600" font-size="58" letter-spacing="2" text-anchor="middle" fill="url(#b)">CONTACT</text>
      <text x="600" y="610" font-family="Montserrat, sans-serif" font-size="18" letter-spacing="6" text-anchor="middle" fill="#FFEACA" opacity="0.7">WIELDING MAGIC THROUGH FILM</text>
    </svg>
  </template>
</head>
<body class="v2-standalone">
  <div id="root"></div>

  <script type="text/babel" src="contact-core.jsx"></script>
  <script type="text/babel" src="direction-c.jsx"></script>
  <script type="text/babel" src="direction-d.jsx"></script>
  <script type="text/babel" src="app-v2.jsx"></script>
</body>
</html>
