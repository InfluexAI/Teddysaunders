  <!-- Page lives one folder deep (portfolio/). Compute the real site root from the
       URL and set <base> before any asset loads — robust on Vercel whether the page
       is served as /portfolio/photography.html, /portfolio/photography, or .../photography/. -->
  <script>
    (function () {
      var p = location.pathname;
      var i = p.indexOf('/portfolio/');
      var root = i >= 0 ? p.slice(0, i + 1) : '/';
      var b = document.createElement('base');
      b.href = location.origin + root;
      document.head.insertBefore(b, document.head.firstChild);
    })();
  </script>
