<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ted Saunders — Director · Philosopher · Architect of Worlds</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Resources referenced inside JSX strings — lifted here so the
       standalone bundler can inline and the runtime can fetch via
       window.__resources[id]. -->
  <meta name="ext-resource-dependency" content="assets/logo.png" data-resource-id="logo" />
  <meta name="ext-resource-dependency" content="assets/hero-bg.mp4" data-resource-id="heroVideo" />
  <meta name="ext-resource-dependency" content="assets/director-composite.png" data-resource-id="directorImg" />
  <meta name="ext-resource-dependency" content="assets/press/netflix.svg" data-resource-id="pressNetflix" />
  <meta name="ext-resource-dependency" content="assets/press/abc.svg" data-resource-id="pressAbc" />
  <meta name="ext-resource-dependency" content="assets/press/iheart.svg" data-resource-id="pressIheart" />
  <meta name="ext-resource-dependency" content="assets/press/drew-large.svg" data-resource-id="pressDrew" />

  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="components.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Splash thumbnail shown while the bundle unpacks + no-JS fallback. -->
  <template id="__bundler_thumbnail" data-bg-color="#000000">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="#F7DBA0"/>
          <stop offset="40%" stop-color="#E8B777"/>
          <stop offset="80%" stop-color="#C9915C"/>
          <stop offset="100%" stop-color="#AB7442"/>
        </linearGradient>
      </defs>
      <rect width="1200" height="800" fill="#000"/>
      <text x="600" y="380" font-family="Cinzel, Trajan Pro, Times, serif" font-weight="600"
            font-size="118" letter-spacing="-2"
            text-anchor="middle" fill="url(#b)">
        TED SAUNDERS
      </text>
      <text x="600" y="460" font-family="Montserrat, Helvetica, sans-serif" font-weight="400"
            font-size="22" letter-spacing="6"
            text-anchor="middle" fill="#FFEACA" opacity="0.7">
        DIRECTOR &#160;&#183;&#160; PHILOSOPHER &#160;&#183;&#160; ARCHITECT OF WORLDS
      </text>
      <circle cx="600" cy="560" r="3" fill="url(#b)"/>
      <rect x="430" y="558" width="120" height="2" fill="url(#b)" opacity="0.5"/>
      <rect x="650" y="558" width="120" height="2" fill="url(#b)" opacity="0.5"/>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="bundle.jsx"></script>
</body>
</html>
